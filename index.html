<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Consensus</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📈%3C/text%3E%3C/svg%3E">
<style>
  :root { --bg:#fff; --fg:#111; --muted:#8a8a8a; --line:#ececec; --hover:#f6f6f4; --accent:#2563eb; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0e0e0e; --fg:#f2f2f2; --muted:#8f8f8f; --line:#232323; --hover:#1a1a1a; --accent:#6ea8fe; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",Roboto,sans-serif;
    line-height:1.4; }
  .wrap { max-width:900px; margin:0 auto; padding:8vh 24px 12vh; }
  h1 { font-size:clamp(1.9rem,5vw,2.8rem); font-weight:600; letter-spacing:-0.03em; margin:0 0 .3rem; }
  .sub { color:var(--muted); font-size:.95rem; }
  .meta { color:var(--muted); font-size:.78rem; margin-top:.6rem; text-transform:uppercase; letter-spacing:.1em; }
  .badge { display:inline-block; background:var(--hover); border:1px solid var(--line);
    color:var(--muted); font-size:.7rem; padding:.15rem .5rem; border-radius:999px; margin-left:.5rem;
    text-transform:none; letter-spacing:0; }
  ul { list-style:none; margin:2.5rem 0 0; padding:0; border-top:1px solid var(--line); }
  li { border-bottom:1px solid var(--line); }
  a.item { display:flex; align-items:baseline; justify-content:space-between; gap:1rem;
    padding:1rem .5rem; text-decoration:none; color:inherit; transition:background .15s,padding .15s; }
  a.item:hover { background:var(--hover); padding-left:1rem; padding-right:1rem; }
  .nm { font-weight:500; }
  .sec { color:var(--muted); font-size:.8rem; }
  .cnt { color:var(--muted); font-size:.78rem; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .empty { padding:2rem .5rem; color:var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Smart Consensus <span class="badge">구축 중 · Phase 1</span></h1>
    <div class="sub">증권사 목표주가 컨센서스 추적 — 주가 · 목표가 추이 · 반응성/선행성 분석</div>
    <div class="meta" id="meta">데이터 로딩…</div>
    <ul id="list"><li class="empty">불러오는 중…</li></ul>
  </div>
<script>
(async function(){
  const listEl = document.getElementById('list');
  const metaEl = document.getElementById('meta');
  try {
    const r = await fetch('data/index.json?_=' + Date.now());
    const idx = await r.json();
    const companies = idx.companies || [];
    metaEl.textContent = `${companies.length} 종목` + (idx.updated ? ` · 갱신 ${idx.updated}` : '');
    if (!companies.length) { listEl.innerHTML = '<li class="empty">아직 수집된 데이터가 없습니다.</li>'; return; }
    listEl.innerHTML = companies.map(c =>
      `<li><a class="item" href="company.html?code=${encodeURIComponent(c.code)}">
        <span><span class="nm">${c.name||c.code}</span> <span class="sec">${c.sector||''}</span></span>
        <span class="cnt">${c.code}${c.reports!=null ? ' · 리포트 '+c.reports : ''}</span>
      </a></li>`).join('');
  } catch(e) {
    metaEl.textContent = '데이터 로드 실패';
    listEl.innerHTML = '<li class="empty">index.json 을 불러오지 못했습니다.</li>';
  }
})();
</script>
</body>
</html>
